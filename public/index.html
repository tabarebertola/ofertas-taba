<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Ofertas Taba</title>
<style>
  :root{
    --bg:#101314; --card:#1a1f21; --line:#2a3134;
    --text:#e8e6df; --muted:#8b948f;
    --down:#4ade80; --up:#f87171; --accent:#ffd166;
    --radius:14px; font-size:16px;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    padding:20px 14px 60px;max-width:760px;margin-inline:auto}
  header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px}
  h1{font-size:1.35rem;margin:0;letter-spacing:.5px}
  h1 span{color:var(--accent)}
  #status{font-size:.78rem;color:var(--muted)}
  .adder{display:flex;gap:8px;margin:14px 0 22px}
  .adder input{flex:1;background:var(--card);border:1px solid var(--line);
    border-radius:var(--radius);color:var(--text);padding:12px 14px;font-size:.95rem;min-width:0}
  .adder input::placeholder{color:var(--muted)}
  .adder button{background:var(--accent);color:#1a1500;border:0;border-radius:var(--radius);
    padding:12px 18px;font-weight:600;font-size:.95rem;cursor:pointer;flex-shrink:0}
  .adder button:active{transform:scale(.97)}
  #msg{font-size:.85rem;color:var(--muted);min-height:1.2em;margin:-14px 0 16px}
  .card{display:flex;gap:14px;background:var(--card);border:1px solid var(--line);
    border-radius:var(--radius);padding:14px;margin-bottom:12px;text-decoration:none;color:inherit;position:relative}
  .card img{width:84px;height:84px;object-fit:contain;background:#fff;border-radius:10px;flex-shrink:0}
  .info{flex:1;min-width:0}
  .title{font-size:.9rem;line-height:1.3;margin:0 0 6px;display:-webkit-box;
    -webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .price{font-size:1.25rem;font-weight:700}
  .meta{font-size:.78rem;color:var(--muted);margin-top:4px}
  .badge{position:absolute;top:12px;right:12px;font-size:.8rem;font-weight:700;
    padding:3px 9px;border-radius:999px;background:#26302b;color:var(--down)}
  .badge.up{background:#332527;color:var(--up)}
  .badge.flat{background:#242a2d;color:var(--muted)}
  .minflag{display:inline-block;font-size:.72rem;color:#1a1500;background:var(--accent);
    border-radius:6px;padding:1px 7px;font-weight:700;margin-left:6px;vertical-align:middle}
  .del{position:absolute;bottom:10px;right:12px;background:none;border:0;color:var(--muted);
    font-size:.75rem;cursor:pointer;padding:4px}
  .del:hover{color:var(--up)}
  .empty{text-align:center;color:var(--muted);padding:60px 20px;line-height:1.6}
  .spark{margin-top:6px}
  .result{display:flex;gap:12px;align-items:center;background:var(--card);
    border:1px dashed var(--line);border-radius:var(--radius);padding:10px 12px;margin-bottom:8px}
  .result img{width:56px;height:56px;object-fit:contain;background:#fff;border-radius:8px;flex-shrink:0}
  .result .rtitle{flex:1;font-size:.85rem;line-height:1.3;min-width:0}
  .result .rmeta{display:block;color:var(--muted);font-size:.75rem;margin-top:2px}
  .result button{background:none;border:1px solid var(--accent);color:var(--accent);
    border-radius:999px;padding:6px 14px;font-size:.82rem;font-weight:600;cursor:pointer;flex-shrink:0}
  .result button:disabled{opacity:.5}
  #results .close{width:100%;text-align:center;background:none;border:0;color:var(--muted);
    font-size:.8rem;cursor:pointer;padding:8px;margin-bottom:10px}
</style>
</head>
<body>
<header>
  <h1>Ofertas <span>Taba</span></h1>
  <div id="status"></div>
</header>
<div class="adder">
  <input id="url" type="text" placeholder="Buscá un producto o pegá un link de ML..." autocomplete="off">
  <button id="addBtn">Buscar</button>
</div>
<div id="msg"></div>
<div id="results"></div>
<div id="feed"></div>

<script>
const $ = s => document.querySelector(s);
const fmt = n => n == null ? '—' : '$' + Math.round(n).toLocaleString('es-AR');

function getPin(){
  let pin = localStorage.getItem('pin');
  if(!pin){ pin = prompt('PIN de la página:') || ''; localStorage.setItem('pin', pin); }
  return pin;
}

function spark(points){
  if(!points || points.length < 2) return '';
  const w=140,h=26, ps=points.map(x=>x.p);
  const min=Math.min(...ps), max=Math.max(...ps), span=(max-min)||1;
  const step=w/(ps.length-1);
  const d=ps.map((p,i)=>`${i?'L':'M'}${(i*step).toFixed(1)},${(h-2-((p-min)/span)*(h-4)).toFixed(1)}`).join(' ');
  const color = ps[ps.length-1] <= ps[0] ? 'var(--down)' : 'var(--up)';
  return `<svg class="spark" width="${w}" height="${h}"><path d="${d}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round"/></svg>`;
}

function card(it){
  const ch = it.change_vs_first;
  const cls = ch == null || Math.abs(ch) < 0.5 ? 'flat' : (ch < 0 ? '' : 'up');
  const badge = ch == null ? 'nuevo' : (ch > 0 ? '+' : '') + ch + '%';
  const last = it.last_check ? new Date(it.last_check).toLocaleString('es-AR',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) : '';
  return `<div class="card">
    <a href="${it.permalink||'#'}" target="_blank" rel="noopener" style="display:contents">
      <img src="${it.thumbnail||''}" alt="" loading="lazy" onerror="this.style.visibility='hidden'">
      <div class="info">
        <p class="title">${it.title||it.id}</p>
        <span class="price">${fmt(it.current)}</span>${it.at_min && it.points.length>1 ? '<span class="minflag">mínimo</span>':''}
        <div class="meta">arrancó ${fmt(it.first)} · mín ${fmt(it.min)} · ${last}</div>
        ${spark(it.points)}
      </div>
    </a>
    <span class="badge ${cls}">${badge}</span>
    <button class="del" data-id="${it.id}">quitar</button>
  </div>`;
}

async function load(){
  $('#status').textContent = 'cargando...';
  try{
    const r = await fetch('/api/list?t=' + Date.now());
    const j = await r.json();
    const feed = j.feed || [];
    $('#feed').innerHTML = feed.length
      ? feed.map(card).join('')
      : '<div class="empty">Todavía no vigilás nada.<br>Pegá arriba el link de algo que te guste de Mercado Libre y el robot le sigue el precio.</div>';
    $('#status').textContent = feed.length ? feed.length + ' vigilados' : '';
    document.querySelectorAll('.del').forEach(b => b.onclick = async e => {
      e.preventDefault();
      if(!confirm('¿Dejar de vigilar este producto?')) return;
      await fetch('/api/add',{method:'POST',headers:{'Content-Type':'application/json'},
        body: JSON.stringify({remove: b.dataset.id, pin: getPin()})});
      load();
    });
  }catch(err){
    $('#status').textContent = '';
    $('#feed').innerHTML = '<div class="empty">No pude cargar el feed. Probá recargar.</div>';
  }
}

async function track(idOrUrl, btn){
  if(btn){ btn.disabled = true; btn.textContent = '...'; }
  $('#msg').textContent = 'Agregando...';
  try{
    const r = await fetch('/api/add',{method:'POST',headers:{'Content-Type':'application/json'},
      body: JSON.stringify({url: idOrUrl, pin: getPin()})});
    const j = await r.json();
    if(!r.ok){
      if(r.status === 401){ localStorage.removeItem('pin'); }
      $('#msg').textContent = j.error || 'Error';
      if(btn){ btn.disabled = false; btn.textContent = 'Vigilar'; }
      return;
    }
    $('#msg').textContent = 'Listo: ' + (j.title || j.added) + ' a ' + fmt(j.price);
    if(btn){ btn.textContent = 'Vigilado'; }
    load();
  }catch(err){
    $('#msg').textContent = 'Error de red, probá de nuevo.';
    if(btn){ btn.disabled = false; btn.textContent = 'Vigilar'; }
  }
}

async function search(q){
  $('#msg').textContent = 'Buscando "' + q + '"...';
  $('#results').innerHTML = '';
  try{
    const r = await fetch('/api/search?q=' + encodeURIComponent(q));
    const j = await r.json();
    if(!r.ok){ $('#msg').textContent = j.error || 'Error buscando'; return; }
    if(!j.results || !j.results.length){
      $('#msg').textContent = 'No encontré nada con eso, probá con otras palabras.';
      return;
    }
    $('#msg').textContent = 'Tocá "Vigilar" en los que te interesen:';
    $('#results').innerHTML = j.results.map(p => `
      <div class="result">
        <a href="https://www.mercadolibre.com.ar/p/${p.id}" target="_blank" rel="noopener" style="display:contents">
          <img src="${p.picture||''}" alt="" loading="lazy" onerror="this.style.visibility='hidden'">
          <div class="rtitle">${p.name}
            <span class="rmeta">${[p.brand,p.width,p.color].filter(Boolean).join(' · ')} · tocá para ver en ML</span>
          </div>
        </a>
        <button data-id="${p.id}">Vigilar</button>
      </div>`).join('')
      + '<button class="close" id="closeResults">cerrar resultados</button>';
    document.querySelectorAll('#results .result button').forEach(b =>
      b.onclick = () => track(b.dataset.id, b));
    $('#closeResults').onclick = () => { $('#results').innerHTML = ''; $('#msg').textContent = ''; };
  }catch(err){ $('#msg').textContent = 'Error de red, probá de nuevo.'; }
}

function go(){
  const v = $('#url').value.trim();
  if(!v) return;
  if(/^https?:\/\//i.test(v) || /mercadolibre/i.test(v)) track(v);
  else search(v);
}
$('#addBtn').onclick = go;
$('#url').addEventListener('keydown', e => { if(e.key === 'Enter') go(); });
$('#url').addEventListener('input', () => {
  $('#addBtn').textContent = /^https?:\/\//i.test($('#url').value.trim()) ? 'Vigilar' : 'Buscar';
});

load();
</script>
</body>
</html>
